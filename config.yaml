# General Settings
mode: "synthetic"  # Options: "train", "synthetic"
random_seed: 42
log_level: "INFO"

# Data Paths
data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  test_split: 0.2

# Synthetic Data Generation (for demo)
synthetic:
  n_samples: 5000
  n_features: 50

# Feature Extraction Settings
features:
  sample_rate: 22050
  n_mfcc: 40
  hop_length: 512
  n_fft: 2048

# Model Hyperparameters
models:
  svm:
    kernel: "rbf"
    probability: true
  
  random_forest:
    n_estimators: 100
    random_state: 42
  
  logistic_regression:
    max_iter: 3000
    random_state: 42
  
  knn:
    n_neighbors: 5
  
  mlp:
    hidden_layer_sizes: [100, 50]
    max_iter: 500
    alpha: 0.0001
    random_state: 42

  xgboost:
    n_estimators: 500
    learning_rate: 0.05
    max_depth: 6
    subsample: 0.8
    colsample_bytree: 0.8
    objective: "binary:logistic" 
    tree_method: "hist"
    device: "cuda"

# Output Paths
outputs:
  plots_dir: "plots"
  logs_dir: "logs"
  model_save_dir: "src/models/saved"
